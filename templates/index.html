<!DOCTYPE html>
<html>
<head>
    <title>AI Game Review Generator</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            color: #e94560;
            text-align: center;
        }
        input {
            width: 70%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .review-box {
            background-color: #16213e;
            padding: 24px;
            border-radius: 12px;
            margin-top: 32px;
            white-space: pre-wrap;
        }
        .loader {
            display: none;
            text-align: center;
            margin-top: 32px;
            font-size: 18px;
            color: #e94560;
        }
        .spinner {
            border: 4px solid #16213e;
            border-top: 4px solid #e94560;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 16px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .score-bar-container {
            margin: 16px 0;
        }
        .score-label {
            font-size: 18px;
            margin-bottom: 8px;
            color: #e94560;
        }
        .score-bar {
    background-color: #0f3460;
    border-radius: 8px;
    height: 28px;
    width: 100%;
    position: relative;
}
.score-fill {
    background-color: #4caf50;
    height: 28px;
    border-radius: 8px;
    transition: width 1s ease-in-out;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 8px;
    font-weight: bold;
    font-size: 14px;
}
        .game-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 16px;
            max-height: 300px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <h1>🎮 AI Game Review Generator</h1>
    <form action="/search" method="POST" onsubmit="showLoader()">
        <input type="text" name="game" placeholder="Enter a game name..." id="gameInput">
        <button type="submit">Generate Review</button>
    </form>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>AI is generating your review...</p>
    </div>

    {% if review %}
    <div class="review-box">
        {% if image_url %}
        <img src="{{ image_url }}" class="game-image" alt="{{ game_name }}">
        {% endif %}
        
        <h2>{{ game_name }}</h2>
        
        {% if score %}
        <div class="score-bar-container">
            <div class="score-label">Score: {{ score }}/10</div>
            <div class="score-bar">
                <div class="score-fill" style="width: {{ (score * 10)|int }}%">{{ (score * 10)|int }}%</div>
            </div>
        </div>
        {% endif %}
        
        <p>{{ review | safe }}</p>
    </div>
    {% endif %}

    <script>
        function showLoader() {
            document.getElementById('loader').style.display = 'block';
        }
    </script>
</body>
</html>
